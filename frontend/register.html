<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | FeedForward</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="register-bg">

<div class="register-container">
    <h2>Create Account</h2>
    <p class="register-subtext">Join us in reducing food waste</p>

    <form onsubmit="registerUser(event)">
        <input type="text" id="name" name="name" placeholder="Full Name" required>

        <input type="email" id="email" name="email" placeholder="Email" required>

        <input type="password" id="password" name="password" placeholder="Password" required>

        <select id="role" name="role" required>
            <option value="">Select Role</option>
            <option value="Donor">Donor</option>
            <option value="NGO">NGO</option>
            <option value="Admin">Admin</option>
        </select>
        <input 
          type="password" 
          id="adminSecret" 
          placeholder="Admin Secret Password"
          style="display:none"
        />


        <button type="submit">Register</button>
    </form>

    <p class="login-link">
        Already have an account? <a href="login.html">Login</a>
    </p>
</div>

<script src="js/script.js"></script>
<script>
  const roleSelect = document.getElementById("role");
  const adminInput = document.getElementById("adminSecret");

  roleSelect.addEventListener("change", function () {
    if (this.value === "Admin") {
      adminInput.style.display = "block";
      adminInput.required = true;
    } else {
      adminInput.style.display = "none";
      adminInput.required = false;
    }
  });
</script>
<!-- 🌟 Custom Popup -->
<div id="popup" class="popup-overlay">
  <div class="popup-box">
    <div id="popupIcon">✔</div>
    <h3 id="popupTitle">Success</h3>
    <p id="popupMessage">Done successfully</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>


</body>
</html>
