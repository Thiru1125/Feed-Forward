<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donate Food | FeedForward</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="donate-bg">

<div class="donate-wrapper">
  <div class="donate-card">
    
    <div class="donate-form">
      <h2>Donate Food</h2>
      <p>
                Help reduce food waste by donating excess food.
                Your contribution can feed people in need.
      </p> 

      <!-- ✅ IMPORTANT -->
      <form onsubmit="donateFood(event)">
        <input type="text" id="foodName" placeholder="Food Name" required>
        <input type="text" id="quantity" placeholder="Quantity" required>
        <input type="text" id="location" placeholder="Pickup Location" required>
        <input type="text" id="contact" placeholder="Contact Number" required>

        <!-- ✅ Button type submit -->
        <button type="submit">Donate</button>
      </form>

    </div>
  </div>
</div>

<script src="js/script.js"></script>
<!-- 🌟 Custom Popup -->
<div id="popup" class="popup-overlay">
  <div class="popup-box">
    <div id="popupIcon">✔</div>
    <h3 id="popupTitle">Success</h3>
    <p id="popupMessage">Done successfully</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

</body>
</html>
