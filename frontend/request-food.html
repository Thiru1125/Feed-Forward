<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Request Food | FeedForward</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="donate-bg">

<div class="donate-wrapper">
  <div class="donate-card">
    <div class="donate-form">
      <h2>Request Food</h2>
      <p>
        NGOs and individuals in need can request food here.
        Your request will be reviewed by the admin.
      </p>

      <!-- ✅ ONLY ID CHANGES -->
      <form onsubmit="requestFood(event)">
        <input type="text" id="name" placeholder="Your Name / NGO Name" required>
        <input type="text" id="quantity" placeholder="Required Quantity" required>
        <input type="text" id="location" placeholder="Delivery Location" required>
        <input type="text" id="contact" placeholder="Contact Number" required>
        <button type="submit">Send Request</button>
      </form>

    </div>
  </div>
</div>

<script src="js/script.js"></script>

<div id="popup" class="popup-overlay">
  <div class="popup-box">
    <div id="popupIcon">✔</div>
    <h3 id="popupTitle">Success</h3>
    <p id="popupMessage">Done successfully</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

</body>
</html>
